<!DOCTYPE html>
<html>
<head>
    <title>Eye Disease Detection</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .navbar {
            background: #0a3d62;
            padding: 14px 25px;
            display: flex;
            align-items: center;
        }

        .navbar h2 {
            color: white;
            margin: 0;
            flex: 1;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 18px;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        button {
            background: #0a3d62;
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #074173;
        }

        img {
            margin-top: 10px;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>Eye Disease Detection</h2>
    <a href="/">Home</a>
    <a href="/dataset">Dataset</a>
    <a href="/instructions">Instructions</a>
    <a href="/model1">Model 1</a>
    <a href="/model2">Model 2</a>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
